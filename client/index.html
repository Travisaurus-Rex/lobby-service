<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobby Client</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 50px auto;
        padding: 20px;
      }
      .messages {
        border: 1px solid #ccc;
        padding: 10px;
        height: 300px;
        overflow-y: auto;
        margin-bottom: 20px;
        background: #f9f9f9;
      }
      .message {
        margin: 5px 0;
        padding: 5px;
        background: white;
        border-radius: 3px;
      }
      .input-group {
        display: flex;
        gap: 10px;
      }
      input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      .status {
        margin-bottom: 20px;
        padding: 10px;
        border-radius: 3px;
      }
      .connected {
        background: #d4edda;
        color: #155724;
      }
      .disconnected {
        background: #f8d7da;
        color: #721c24;
      }
      .lobby-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border: 1px solid #ccc;
        margin-bottom: 8px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Lobby Client</h1>

      <div :class="['status', connected ? 'connected' : 'disconnected']">
        {{ connected ? 'Connected to server' : 'Disconnected' }}
      </div>

      <!-- Lobby List -->
      <div v-if="!currentLobby">
        <h2>Lobbies</h2>
        <div v-if="lobbies.length === 0">No lobbies available.</div>
        <div v-for="lobby in lobbies" :key="lobby.id" class="lobby-item">
          <span>{{ lobby.id }} ({{ lobby.size }} players)</span>
          <button @click="joinLobby(lobby.id)" :disabled="!connected">
            Join
          </button>
        </div>
      </div>

      <!-- Chat -->
      <div v-if="currentLobby">
        <h2>Lobby: {{ currentLobby }}</h2>
        <div class="messages">
          <div v-for="(msg, index) in messages" :key="index" class="message">
            {{ msg }}
          </div>
        </div>
        <div class="input-group">
          <input
            v-model="newMessage"
            @keyup.enter="sendMessage"
            placeholder="Type a message..."
            :disabled="!connected"
          />
          <button @click="sendMessage" :disabled="!connected">Send</button>
        </div>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            ws: null,
            connected: false,
            messages: [],
            newMessage: "",
            lobbies: [],
            currentLobby: null,
          };
        },
        mounted() {
          this.connect();
        },
        methods: {
          connect() {
            this.ws = new WebSocket("ws://localhost:3399");

            this.ws.onopen = () => {
              this.connected = true;
            };

            this.ws.onmessage = (event) => {
              const { type, payload } = JSON.parse(event.data);

              switch (type) {
                case "lobby_list":
                  this.lobbies = payload;
                  break;
                case "chat":
                  this.messages.push(payload.message);
                  break;
              }
            };

            this.ws.onclose = () => {
              this.connected = false;
            };

            this.ws.onerror = (error) => {
              console.error("WebSocket error:", error);
            };
          },

          joinLobby(lobbyId) {
            this.ws.send(
              JSON.stringify({ type: "join_lobby", payload: { lobbyId } }),
            );
            this.currentLobby = lobbyId;
          },

          sendMessage() {
            if (this.newMessage.trim() && this.connected) {
              this.ws.send(
                JSON.stringify({
                  type: "chat",
                  payload: { message: this.newMessage },
                }),
              );
              this.newMessage = "";
            }
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
